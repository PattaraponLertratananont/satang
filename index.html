<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="คลังเงิน">
<title>คลังเงิน</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a;
  --surface: #141414;
  --surface2: #1c1c1c;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --text: #f0ede8;
  --muted: rgba(240,237,232,0.45);
  --hint: rgba(240,237,232,0.25);
  --gold: #c9a84c;
  --gold-dim: rgba(201,168,76,0.15);
  --gold-mid: rgba(201,168,76,0.35);
  --green: #4caf85;
  --green-dim: rgba(76,175,133,0.12);
  --red: #e05c5c;
  --red-dim: rgba(224,92,92,0.12);
  --blue: #5b9bd5;
  --blue-dim: rgba(91,155,213,0.12);
  --amber: #d4913a;
  --amber-dim: rgba(212,145,58,0.12);
  --radius: 14px;
  --radius-sm: 8px;
  --font: 'Sarabun', sans-serif;
}
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  overflow-x: hidden;
}
.app { display: flex; flex-direction: column; min-height: 100dvh; }
.topbar {
  position: sticky; top: 0; z-index: 100;
  padding: env(safe-area-inset-top, 12px) 20px 0;
  background: linear-gradient(to bottom, var(--bg) 70%, transparent);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
}
.topbar-inner {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 0; border-bottom: 0.5px solid var(--border);
}
.logo { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; color: var(--gold); }
.logo span { color: var(--text); font-size: 13px; font-family: var(--font); font-weight: 300; margin-left: 8px; opacity: 0.6; }

.month-selector { display: flex; gap: 6px; }
.month-selector select {
  background: var(--surface2); border: 0.5px solid var(--border2);
  color: var(--text); font-family: var(--font); font-size: 13px;
  padding: 6px 10px; border-radius: var(--radius-sm); outline: none;
}

.content { flex: 1; padding: 20px; padding-bottom: 120px; max-width: 680px; margin: 0 auto; width: 100%; }

/* Nav */
.nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  padding: 10px 20px calc(env(safe-area-inset-bottom, 10px) + 10px);
  background: rgba(10,10,10,0.92); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border-top: 0.5px solid var(--border); display: flex; justify-content: space-around;
}
.nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;
  background: none; border: none; color: var(--muted); font-size: 11px; cursor: pointer;
}
.nav-btn svg { width: 22px; height: 22px; }
.nav-btn.active { color: var(--gold); }

/* Section Visibility */
.section { display: none; animation: fadeIn 0.25s ease; }
.section.active { display: block; }
@keyframes fadeIn { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform:none; } }

/* UI Components */
.card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 14px; }
.card-title { font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; }
.card-accent { border-color: var(--gold-mid); background: linear-gradient(135deg, var(--surface) 0%, rgba(201,168,76,0.04) 100%); }

.metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.metric { background: var(--surface2); border-radius: var(--radius-sm); padding: 14px 16px; border: 0.5px solid var(--border); }
.metric-label { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
.metric-value { font-size: 20px; font-weight: 600; }
.metric-value.income { color: var(--green); }
.metric-value.expense { color: var(--red); }
.metric-value.tax { color: var(--amber); }
.metric-value.cashflow { color: var(--blue); }
.metric.span2 { grid-column: span 2; }

/* Calendar */
.calendar-info { background: var(--gold-dim); border: 0.5px solid var(--gold-mid); border-radius: var(--radius-sm); padding: 12px; font-size: 14px; color: var(--gold); margin-bottom: 16px; line-height: 1.5; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
.cal-cell { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 12px; border-radius: 6px; }
.cal-header { color: var(--muted); font-size: 10px; }
.cal-work { background: rgba(76,175,133,0.15); color: var(--green); }
.cal-off { background: var(--surface2); color: var(--hint); }
.cal-holiday { background: rgba(224,92,92,0.12); color: var(--red); }

/* Form */
.form-group { margin-bottom: 14px; }
.form-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; display: block; }
.form-input { width: 100%; background: var(--surface2); border: 0.5px solid var(--border2); color: var(--text); padding: 12px; border-radius: var(--radius-sm); outline: none; font-family: var(--font); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.btn { width: 100%; padding: 12px; border-radius: var(--radius-sm); border: none; font-family: var(--font); font-weight: 600; cursor: pointer; transition: 0.2s; }
.btn-gold { background: var(--gold); color: #0a0a0a; }
.btn-gold:active { transform: scale(0.98); opacity: 0.9; }

/* Transaction List */
.tx-item { display: flex; align-items: center; gap: 12px; background: var(--surface2); border-radius: var(--radius-sm); padding: 12px; margin-bottom: 8px; border: 0.5px solid var(--border); }
.tx-dot { width: 8px; height: 8px; border-radius: 50%; }
.tx-info { flex: 1; }
.tx-name { font-size: 14px; font-weight: 500; }
.tx-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
.tx-amount { font-size: 15px; font-weight: 600; }
.tx-del { background: none; border: none; color: var(--hint); font-size: 18px; padding: 0 5px; cursor: pointer; }

/* Chart */
.chart-wrap { position: relative; width: 100%; height: 220px; margin-top: 10px; }

.api-status { font-size: 12px; margin-top: 8px; }
.api-status.ok { color: var(--green); }
.api-status.err { color: var(--red); }

@media (min-width: 600px) { .metrics { grid-template-columns: repeat(4, 1fr); } }
</style>
</head>
<body>

<div class="app">
  <div class="topbar">
    <div class="topbar-inner">
      <div class="logo">คลังเงิน <span>Dashboard</span></div>
      <div class="month-selector">
        <select id="sel-month" onchange="onMonthChange()">
          <option value="0">ม.ค.</option><option value="1">ก.พ.</option><option value="2">มี.ค.</option>
          <option value="3">เม.ย.</option><option value="4">พ.ค.</option><option value="5">มิ.ย.</option>
          <option value="6">ก.ค.</option><option value="7">ส.ค.</option><option value="8">ก.ย.</option>
          <option value="9">ต.ค.</option><option value="10">พ.ย.</option><option value="11">ธ.ค.</option>
        </select>
        <select id="sel-year" onchange="onMonthChange()"></select>
      </div>
    </div>
  </div>

  <div class="content">
    
    <div id="sec-income" class="section active">
      <div class="card card-accent">
        <div class="card-title">ตั้งค่ารายรับวันทำงาน</div>
        <div class="form-group">
          <label class="form-label">รายได้ต่อวัน (฿)</label>
          <input type="number" id="daily-rate" class="form-input" value="3500" oninput="saveSettings();recalc()">
        </div>
        <button class="btn btn-gold" onclick="fetchHolidays()">🔄 อัปเดตวันหยุดจาก BOT</button>
        <div id="api-status" class="api-status"></div>
      </div>

      <div class="card">
        <div class="card-title">ปฏิทินทำงานเดือนนี้</div>
        <div id="cal-info" class="calendar-info">กำลังคำนวณ...</div>
        <div id="cal-grid" class="cal-grid"></div>
      </div>

      <div class="metrics" id="income-metrics"></div>
    </div>

    <div id="sec-tx" class="section">
      <div class="card">
        <div class="card-title">เพิ่มรายการ</div>
        <div class="form-group">
          <label class="form-label">ประเภท</label>
          <select id="tx-type" class="form-input">
            <option value="expense">รายจ่ายทั่วไป</option>
            <option value="fixed">รายจ่ายประจำเดือน</option>
            <option value="tax">ภาษีเพิ่มเติม</option>
            <option value="income">รายรับเสริม</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">ชื่อรายการ</label>
          <input type="text" id="tx-name" class="form-input" placeholder="เช่น ค่าที่พัก, ประกัน...">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">จำนวน (฿)</label>
            <input type="number" id="tx-amount" class="form-input" placeholder="0">
          </div>
          <div class="form-group">
            <label class="form-label">วันที่</label>
            <input type="date" id="tx-date" class="form-input">
          </div>
        </div>
        <button class="btn btn-gold" onclick="addTx()">+ บันทึกรายการ</button>
      </div>

      <div class="card">
        <div class="card-title">รายการทั้งหมด</div>
        <div id="tx-list"></div>
      </div>
    </div>

    <div id="sec-cf" class="section">
      <div class="metrics" id="cf-metrics"></div>
      <div class="card">
        <div class="card-title">สรุปภาพรวมรายเดือน</div>
        <div class="chart-wrap"><canvas id="cf-chart"></canvas></div>
      </div>
    </div>

    <div id="sec-future" class="section">
      <div class="card card-accent">
        <div class="card-title">จำลองรายจ่ายใหม่ (เช่น ผ่อนรถ)</div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">ยอดที่ต้องจ่าย/เดือน</label>
            <input type="number" id="fut-monthly" class="form-input" value="8500" oninput="calcFuture()">
          </div>
          <div class="form-group">
            <label class="form-label">จำนวนงวด (เดือน)</label>
            <input type="number" id="fut-term" class="form-input" value="60" oninput="calcFuture()">
          </div>
        </div>
        <div id="fut-result"></div>
      </div>
      <div class="card">
        <div class="card-title">กราฟเงินออมสะสม 12 เดือน</div>
        <div class="chart-wrap"><canvas id="sav-chart"></canvas></div>
      </div>
    </div>

    <div id="sec-settings" class="section">
      <div class="card">
        <div class="card-title">ข้อมูลผู้ใช้</div>
        <div class="form-group">
          <label class="form-label">เงินออมเริ่มต้นที่มีอยู่ (฿)</label>
          <input type="number" id="existing-savings" class="form-input" placeholder="0" oninput="saveSettings()">
        </div>
        <div style="margin-top:20px;">
          <button class="btn" style="background:#222; color:var(--red);" onclick="clearAll()">ล้างข้อมูลทั้งหมด</button>
        </div>
      </div>
    </div>

  </div>

  <nav class="nav">
    <button class="nav-btn active" onclick="showSection('income')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      รายรับ
    </button>
    <button class="nav-btn" onclick="showSection('tx')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      รายการ
    </button>
    <button class="nav-btn" onclick="showSection('cf')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      วิเคราะห์
    </button>
    <button class="nav-btn" onclick="showSection('future')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      อนาคต
    </button>
    <button class="nav-btn" onclick="showSection('settings')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      ตั้งค่า
    </button>
  </nav>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
let state = {
  month: new Date().getMonth(),
  year: new Date().getFullYear(),
  dailyRate: 3500,
  holidays: [],
  transactions: [],
  existingSavings: 0,
  workdays: 0,
  income: 0
};

// ข้อมูลสำรอง (Fallback)
const FALLBACK_HOLIDAYS = ['2024-01-01','2024-04-13','2024-04-14','2024-04-15','2025-01-01','2025-04-13','2025-04-14','2025-04-15','2026-01-01','2026-04-13'];

function init() {
  loadData();
  const yr = document.getElementById('sel-year');
  for(let y=2024; y<=2027; y++) {
    const o = document.createElement('option');
    o.value = y; o.textContent = y + 543;
    if(y === state.year) o.selected = true;
    yr.appendChild(o);
  }
  document.getElementById('sel-month').value = state.month;
  document.getElementById('daily-rate').value = state.dailyRate;
  document.getElementById('existing-savings').value = state.existingSavings || '';
  document.getElementById('tx-date').value = new Date().toISOString().split('T')[0];
  if(!state.holidays.length) state.holidays = [...FALLBACK_HOLIDAYS];
  recalc();
}

function saveData() {
  localStorage.setItem('khlang_v2_state', JSON.stringify({
    transactions: state.transactions,
    holidays: state.holidays,
    dailyRate: state.dailyRate,
    existingSavings: state.existingSavings
  }));
}

function loadData() {
  const raw = localStorage.getItem('khlang_v2_state');
  if(raw) {
    const d = JSON.parse(raw);
    state.transactions = d.transactions || [];
    state.holidays = d.holidays || [];
    state.dailyRate = d.dailyRate || 3500;
    state.existingSavings = d.existingSavings || 0;
  }
}

function saveSettings() {
  state.dailyRate = parseFloat(document.getElementById('daily-rate').value) || 0;
  state.existingSavings = parseFloat(document.getElementById('existing-savings').value) || 0;
  saveData();
}

async function fetchHolidays() {
  const status = document.getElementById('api-status');
  status.textContent = '🔄 กำลังดึงข้อมูลจาก BOT...';
  status.className = 'api-status';
  try {
    const res = await fetch(`/.netlify/functions/get-holidays?year=${state.year}`);
    if(!res.ok) throw new Error('API Error');
    const data = await res.json();
    const dates = (data.result?.data || []).map(h => h.Date).filter(Boolean);
    const otherYears = state.holidays.filter(d => !d.startsWith(String(state.year)));
    state.holidays = [...otherYears, ...dates];
    saveData();
    status.textContent = `✅ อัปเดตสำเร็จ ${dates.length} วันหยุด`;
    status.className = 'api-status ok';
    recalc();
  } catch(e) {
    status.textContent = '❌ ดึงไม่สำเร็จ (ลองตรวจสอบการ Deploy Netlify Function)';
    status.className = 'api-status err';
  }
}

function recalc() {
  const year = state.year, month = state.month;
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const firstDow = new Date(year, month, 1).getDay();
  let workdays = 0;
  const cells = [];

  for(let i=0; i<firstDow; i++) cells.push({ type: 'empty' });
  for(let d=1; d<=daysInMonth; d++) {
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow = new Date(year, month, d).getDay();
    let type = 'work';
    if(dow === 0 || dow === 6) type = 'off';
    else if(state.holidays.includes(dateStr)) type = 'holiday';
    if(type === 'work') workdays++;
    cells.push({ type, d });
  }
  state.workdays = workdays;
  state.income = workdays * state.dailyRate;
  renderCalendar(cells);
  renderMetrics();
  renderTx();
}

function renderCalendar(cells) {
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = ['อา','จ','อ','พ','พฤ','ศ','ส'].map(h => `<div class="cal-cell cal-header">${h}</div>`).join('');
  cells.forEach(c => {
    const cls = c.type === 'empty' ? '' : `cal-${c.type}`;
    grid.innerHTML += `<div class="cal-cell ${cls}">${c.d || ''}</div>`;
  });
  document.getElementById('cal-info').innerHTML = `วันทำงานเดือนนี้: <strong>${state.workdays} วัน</strong><br>รายได้ประมาณการ: <strong>฿${fmt(state.income)}</strong>`;
}

function renderMetrics() {
  const txs = getMonthTxs();
  const extra = txs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const tax = Math.round(state.income * 0.1);
  document.getElementById('income-metrics').innerHTML = `
    <div class="metric"><div class="metric-label">รายรับหลัก</div><div class="metric-value income">฿${fmt(state.income)}</div></div>
    <div class="metric"><div class="metric-label">รายรับเสริม</div><div class="metric-value income">฿${fmt(extra)}</div></div>
    <div class="metric"><div class="metric-label">ภาษี (10%)</div><div class="metric-value tax">฿${fmt(tax)}</div></div>
    <div class="metric"><div class="metric-label">รับสุทธิ</div><div class="metric-value">฿${fmt(state.income + extra - tax)}</div></div>
  `;
}

function addTx() {
  const type = document.getElementById('tx-type').value;
  const name = document.getElementById('tx-name').value;
  const amount = parseFloat(document.getElementById('tx-amount').value);
  const date = document.getElementById('tx-date').value;
  if(!name || !amount) return alert('กรุณาระบุข้อมูล');
  state.transactions.push({ id: Date.now(), type, name, amount, date });
  saveData(); recalc();
  document.getElementById('tx-name').value = '';
  document.getElementById('tx-amount').value = '';
}

function deleteTx(id) {
  state.transactions = state.transactions.filter(t => t.id !== id);
  saveData(); recalc();
}

function getMonthTxs() {
  const mStr = `${state.year}-${String(state.month+1).padStart(2,'0')}`;
  return state.transactions.filter(t => t.date.startsWith(mStr));
}

function renderTx() {
  const list = document.getElementById('tx-list');
  const txs = getMonthTxs();
  const colors = { income:'#4caf85', expense:'#e05c5c', fixed:'#5b9bd5', tax:'#d4913a' };
  list.innerHTML = txs.map(t => `
    <div class="tx-item">
      <div class="tx-dot" style="background:${colors[t.type]}"></div>
      <div class="tx-info">
        <div class="tx-name">${t.name}</div>
        <div class="tx-meta">${t.date}</div>
      </div>
      <div class="tx-amount" style="color:${t.type==='income'?'var(--green)':'var(--red)'}">${t.type==='income'?'+':'-'}฿${fmt(t.amount)}</div>
      <button class="tx-del" onclick="deleteTx(${t.id})">×</button>
    </div>
  `).join('') || '<div style="text-align:center; padding:20px; color:var(--hint)">ไม่มีรายการเดือนนี้</div>';
}

function showSection(name) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('sec-'+name).classList.add('active');
  event.currentTarget.classList.add('active');
  if(name==='cf') renderCF();
  if(name==='future') calcFuture();
}

let cfChart=null, savChart=null;
function renderCF() {
  const txs = getMonthTxs();
  const tax = Math.round(state.income * 0.1) + txs.filter(t=>t.type==='tax').reduce((s,t)=>s+t.amount,0);
  const exp = txs.filter(t=>['expense','fixed'].includes(t.type)).reduce((s,t)=>s+t.amount,0);
  const extra = txs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const totalInc = state.income + extra;
  const cf = totalInc - tax - exp;

  document.getElementById('cf-metrics').innerHTML = `
    <div class="metric"><div class="metric-label">รายรับรวม</div><div class="metric-value income">฿${fmt(totalInc)}</div></div>
    <div class="metric"><div class="metric-label">รายจ่ายรวม</div><div class="metric-value expense">฿${fmt(exp)}</div></div>
    <div class="metric"><div class="metric-label">ภาษีรวม</div><div class="metric-value tax">฿${fmt(tax)}</div></div>
    <div class="metric"><div class="metric-label">CASH FLOW</div><div class="metric-value cashflow">฿${fmt(cf)}</div></div>
  `;

  if(cfChart) cfChart.destroy();
  cfChart = new Chart(document.getElementById('cf-chart'), {
    type: 'doughnut',
    data: {
      labels: ['เงินเหลือ','รายจ่าย','ภาษี'],
      datasets: [{ data: [Math.max(0,cf), exp, tax], backgroundColor: ['#5b9bd5','#e05c5c','#d4913a'], borderWidth: 0 }]
    },
    options: { plugins: { legend: { position: 'bottom', labels: { color: '#aaa' } } } }
  });
}

function calcFuture() {
  const monthly = parseFloat(document.getElementById('fut-monthly').value) || 0;
  const txs = getMonthTxs();
  const cf = (state.income + txs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0)) 
           - (Math.round(state.income*0.1) + txs.filter(t=>t.type==='tax').reduce((s,t)=>s+t.amount,0))
           - txs.filter(t=>['expense','fixed'].includes(t.type)).reduce((s,t)=>s+t.amount,0);
  
  const remain = cf - monthly;
  document.getElementById('fut-result').innerHTML = `
    <div style="margin-top:15px; padding:12px; background:rgba(255,255,255,0.05); border-radius:8px;">
      Cash Flow เดิม: ฿${fmt(cf)}<br>
      หลังหักรายจ่ายใหม่: <strong style="color:${remain<0?'var(--red)':'var(--green)'}">฿${fmt(remain)}</strong>
    </div>
  `;

  const labels = [], d1 = [], d2 = [];
  let s1 = state.existingSavings, s2 = state.existingSavings;
  for(let i=1; i<=12; i++) {
    labels.push('ด.'+i);
    s1 += Math.max(0, cf);
    s2 += Math.max(0, remain);
    d1.push(s1); d2.push(s2);
  }

  if(savChart) savChart.destroy();
  savChart = new Chart(document.getElementById('sav-chart'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'แผนปัจจุบัน', data: d1, borderColor: '#4caf85', tension: 0.3 },
        { label: 'ถ้ามีรายจ่ายใหม่', data: d2, borderColor: '#5b9bd5', borderDash: [5,5], tension: 0.3 }
      ]
    },
    options: { scales: { y: { ticks: { color: '#666' } }, x: { ticks: { color: '#666' } } } }
  });
}

function onMonthChange() {
  state.month = parseInt(document.getElementById('sel-month').value);
  state.year = parseInt(document.getElementById('sel-year').value);
  recalc();
}

function clearAll() { if(confirm('ยืนยันลบข้อมูลทั้งหมด?')) { localStorage.clear(); location.reload(); } }
function fmt(n) { return Math.round(n).toLocaleString(); }

// Register Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

init();
</script>
</body>
</html>
